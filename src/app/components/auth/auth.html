<div class="auth-container">
  <div class="auth-split">
    <div class="auth-brand">
      <div class="brand-content">
        <img src="/images/logo/logo.webp" alt="Logo" class="brand-logo">
        <h1>CARTERA</h1>
        <p>Gestiona tu cartera de clientes de manera eficiente y segura</p>
      </div>
      <div class="brand-decoration"></div>
    </div>

    <div class="auth-card">
      <div class="auth-header">
        <h2>¡Bienvenido!</h2>
        <p>Inicia sesión para continuar</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
            <input
              type="email"
              id="email"
              formControlName="email"
              placeholder="ejemplo@correo.com"
              [class.invalid]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
            >
          </div>
          <div class="error-msg" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            Ingrese un correo válido.
          </div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input
              type="password"
              id="password"
              formControlName="password"
              placeholder="******"
              [class.invalid]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
            >
          </div>
          <div class="error-msg" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            La contraseña debe tener al menos 6 caracteres.
          </div>
        </div>

        <div class="alert error" *ngIf="error">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
          {{ error }}
        </div>

        <button type="submit" [disabled]="loginForm.invalid || loading">
          <span>{{ loading ? 'Validando...' : 'Iniciar Sesión' }}</span>
          <span *ngIf="loading" class="loading-spinner"></span>
        </button>
      </form>
    </div>
  </div>
</div>
